<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Form</title>
</head>
<body>
{% extends 'base.html' %}

{% block title %}Apply for Loan{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header card-header-custom">
                <h5 class="mb-0">New Loan Application</h5>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <small>Note: Default Interest Rate is <strong>10%</strong> per month.</small>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Applicant</label>
                        {{ form.member }}
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Principal Amount (KES)</label>
                            {{ form.principal_amount }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Duration (Months)</label>
                            {{ form.duration_months }}
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Issue Date</label>
                        {{ form.issue_date }}
                    </div>

                    <div class="d-flex justify-content-end">
                        <a href="{% url 'loan_list' %}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary-custom">Submit Application</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
</body>
</html>
