<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fine_form</title>
</head>
<body>
{% extends 'base.html' %}

{% block title %}Issue Fine{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Issue Penalty</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Member</label>
                        {{ form.member }}
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-8">
                            <label class="form-label">Reason</label>
                            {{ form.reason }}
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Amount (KES)</label>
                            {{ form.amount }}
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Date Issued</label>
                            {{ form.date_issued }}
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <div class="form-check">
                                {{ form.is_paid }}
                                <label class="form-check-label">Already Paid?</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end">
                        <a href="{% url 'fine_list' %}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-danger">Issue Fine</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
</body>
</html>
