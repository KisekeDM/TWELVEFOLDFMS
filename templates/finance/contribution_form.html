<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contribution Form</title>
</head>
<body>
{% extends 'base.html' %}

{% block title %}Record Contribution{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header card-header-custom">
                <h5 class="mb-0">Record Contribution</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Member</label>
                        {{ form.member }}
                        <div class="form-text">Select the member making the payment.</div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Month Paying For</label>
                            {{ form.month_paid_for }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date of Payment</label>
                            {{ form.date }}
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Amount (KES)</label>
                        {{ form.amount }}
                    </div>

                    <div class="d-flex justify-content-end">
                        <a href="{% url 'contribution_list' %}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary-custom">Save Payment</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
</body>
</html>
