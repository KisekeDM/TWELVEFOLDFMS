<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PASSWORD RESET COMPLETE</title>
</head>
<body>
{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 text-center">
        <div class="card shadow-sm border-0 py-5">
            <div class="card-body">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                <h3 class="mt-3">Password Changed!</h3>
                <p class="text-muted mt-3">Your password has been set. You may go ahead and log in now.</p>
                <a href="{% url 'login' %}" class="btn btn-primary-custom mt-3">Log in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
</body>
</html>
