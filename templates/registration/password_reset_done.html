<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PASSWORD RESET DONE</title>
</head>
<body>
{% extends 'base.html' %}
{% block title %}Email Sent{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 text-center">
        <div class="card shadow-sm border-0 py-5">
            <div class="card-body">
                <i class="bi bi-envelope-check text-success" style="font-size: 4rem;"></i>
                <h3 class="mt-3">Check Your Email</h3>
                <p class="text-muted mt-3">We've emailed you instructions for setting your password.</p>
                <p class="text-muted small">If you don't receive an email, please make sure you've entered the address you registered with.</p>
                <a href="{% url 'login' %}" class="btn btn-outline-primary mt-3">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
</body>
</html>
